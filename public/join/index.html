<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rejoindre une partie — MiniGame Universe</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #0d0d1a;
            --surface: #13132b;
            --border: rgba(255,255,255,.08);
            --accent: #00d4ff;
            --accent2: #7c3aed;
            --text: #e2e8f0;
            --text-muted: #64748b;
            --error: #f87171;
            --success: #4ade80;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ── TOPBAR ── */
        .topbar {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: .75rem 1.5rem;
            background: rgba(13,13,26,.95);
            border-bottom: 1px solid var(--border);
            backdrop-filter: blur(8px);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .topbar-logo {
            font-size: 1.2rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-decoration: none;
        }
        .ws-status {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: .4rem;
            font-size: .8rem;
            opacity: .7;
        }
        #ws-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #ef4444;
            transition: background .3s;
        }

        /* ── LAYOUT ── */
        .page {
            max-width: 700px;
            margin: 0 auto;
            width: 100%;
            padding: 2rem 1rem 4rem;
        }

        .page-title {
            font-size: 1.6rem;
            font-weight: 800;
            margin-bottom: .25rem;
        }
        .page-subtitle {
            color: var(--text-muted);
            margin-bottom: 2rem;
            font-size: .9rem;
        }

        /* ── CARDS ── */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 1.25rem 1.5rem;
            margin-bottom: 1.25rem;
        }
        .card-title {
            font-size: .85rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: .05em;
            color: var(--accent);
            margin-bottom: 1rem;
        }

        /* ── FORM ── */
        .field {
            margin-bottom: 1rem;
        }
        .field label {
            display: block;
            font-size: .85rem;
            font-weight: 600;
            margin-bottom: .4rem;
            color: var(--text-muted);
        }
        .input-row {
            display: flex;
            gap: .5rem;
        }
        input[type="text"] {
            width: 100%;
            background: rgba(255,255,255,.05);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: .65rem .9rem;
            color: var(--text);
            font-size: .95rem;
            outline: none;
            transition: border .15s;
        }
        input[type="text"]:focus {
            border-color: var(--accent);
        }

        /* ── BOUTONS ── */
        .btn {
            padding: .65rem 1.2rem;
            border-radius: 8px;
            border: none;
            font-size: .9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all .15s;
            white-space: nowrap;
        }
        .btn-primary {
            background: linear-gradient(135deg, var(--accent), #0090c0);
            color: #000;
        }
        .btn-primary:hover:not(:disabled) { filter: brightness(1.1); transform: translateY(-1px); }
        .btn-primary:disabled { opacity: .4; cursor: not-allowed; transform: none; }
        .btn-secondary {
            background: rgba(255,255,255,.07);
            color: var(--text);
            border: 1px solid var(--border);
        }
        .btn-secondary:hover { background: rgba(255,255,255,.12); }
        .btn-ghost {
            background: none;
            color: var(--text-muted);
            border: 1px solid var(--border);
        }
        .btn-ghost:hover { color: var(--text); }
        .btn-full { width: 100%; display: block; text-align: center; }
        .btn-lg { padding: .85rem 1.5rem; font-size: 1rem; border-radius: 10px; }

        /* ── LISTE PARTIES ── */
        #join-parties-list {
            max-height: 320px;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: #333 transparent;
        }
        #join-parties-list::-webkit-scrollbar { width: 4px; }
        #join-parties-list::-webkit-scrollbar-track { background: transparent; }
        #join-parties-list::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

        /* ── SELECTED INFO ── */
        #join-selected-info { margin-top: .75rem; }

        /* ── STEP indicator ── */
        .steps {
            display: flex;
            gap: .5rem;
            align-items: center;
            margin-bottom: 1.5rem;
        }
        .step {
            display: flex;
            align-items: center;
            gap: .4rem;
            font-size: .82rem;
            color: var(--text-muted);
        }
        .step-num {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: rgba(255,255,255,.07);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: .75rem;
            font-weight: 700;
        }
        .step-sep { color: var(--border); }

        /* ── Refresh button ── */
        .list-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: .75rem;
        }

        /* ── SPIN ── */
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── TOAST ── */
        #toast-container { pointer-events: none; }
    </style>
</head>
<body>

    <!-- TOPBAR -->
    <nav class="topbar">
        <a class="topbar-logo" href="/">🎮 MiniGame Universe</a>
        <div class="ws-status">
            <span id="ws-dot"></span>
            <span id="ws-label">Connexion…</span>
        </div>
    </nav>

    <!-- PAGE -->
    <main class="page">
        <h1 class="page-title">🎮 Rejoindre une partie</h1>
        <p class="page-subtitle">Choisissez une partie dans la liste ou entrez son nom exact pour la trouver.</p>

        <!-- ÉTAPE 1 : Trouver une partie -->
        <div class="card">
            <div class="list-header">
                <div class="card-title" style="margin-bottom:0;">① Choisissez une partie</div>
                <button id="join-btn-refresh" class="btn btn-ghost" style="padding:.3rem .7rem;font-size:.8rem;">🔄 Actualiser</button>
            </div>

            <!-- Recherche par nom exact -->
            <div class="field">
                <label for="join-partie-name">Entrer le nom exact de la partie</label>
                <div class="input-row">
                    <input
                        type="text"
                        id="join-partie-name"
                        placeholder="ex: Soirée Quiz du vendredi"
                        autocomplete="off"
                        maxlength="30"
                    >
                    <button id="join-btn-search" class="btn btn-secondary">🔍 Chercher</button>
                </div>
            </div>

            <!-- Séparateur -->
            <div style="display:flex;align-items:center;gap:.75rem;margin:.75rem 0;color:var(--text-muted);font-size:.8rem;">
                <div style="flex:1;height:1px;background:var(--border);"></div>
                <span>ou dans la liste</span>
                <div style="flex:1;height:1px;background:var(--border);"></div>
            </div>

            <!-- Liste des parties -->
            <div id="join-parties-list">
                <div style="text-align:center;padding:2rem;opacity:.5;">
                    <div style="width:24px;height:24px;border:3px solid #444;border-top-color:#00d4ff;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto .5rem;"></div>
                    Chargement…
                </div>
            </div>

            <!-- Info partie sélectionnée -->
            <div id="join-selected-info" hidden></div>
        </div>

        <!-- ÉTAPE 2 : Entrer son pseudo -->
        <div class="card">
            <div class="card-title">② Votre pseudo</div>
            <div class="field">
                <label for="join-pseudo">Pseudo (2–20 caractères)</label>
                <input
                    type="text"
                    id="join-pseudo"
                    placeholder="ex: SuperJoueur42"
                    autocomplete="nickname"
                    maxlength="20"
                    spellcheck="false"
                >
                <div style="font-size:.75rem;color:var(--text-muted);margin-top:.3rem;">
                    Lettres, chiffres, tiret et underscore uniquement.
                </div>
            </div>
        </div>

        <!-- BOUTON REJOINDRE -->
        <button id="join-btn-submit" class="btn btn-primary btn-full btn-lg" disabled>
            🎮 Rejoindre la partie
        </button>

        <div style="margin-top:1rem;text-align:center;">
            <a href="/" style="color:var(--text-muted);font-size:.85rem;text-decoration:none;">← Retour à l'accueil</a>
        </div>
    </main>

    <div id="toast-container" style="position:fixed;top:1rem;right:1rem;z-index:9999;display:flex;flex-direction:column;gap:.5rem;"></div>

    <script type="module" src="/js/join.js"></script>
</body>
</html>
