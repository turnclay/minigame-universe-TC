<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rejoindre une partie — MiniGame Universe</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/player.css">
  <link rel="icon" type="image/png" href="/images/LogoMiniGame.png">
</head>
<body class="player-body">

<!-- ══ TOASTS ══════════════════════════════════════════ -->
<div id="toast-container" class="toast-container"></div>

<!-- ══════════════════════════════════════════════════════
     ÉCRAN 1 : REJOINDRE UNE PARTIE
     Visible par défaut — masqué après JOIN_OK
════════════════════════════════════════════════════════ -->
<div id="player-join" class="player-screen">
  <div class="join-card">

    <!-- Retour accueil -->
    <a href="/" class="join-back">← MiniGame Universe</a>

    <!-- Logo -->
    <img src="/images/LogoMiniGame.png" alt="Logo" class="join-logo"
         onerror="this.style.display='none'">

    <!-- Titre -->
    <h1 class="join-title">
      Rejoindre<br>
      <span class="join-title-accent">une partie</span>
    </h1>

    <!-- Formulaire -->
    <div class="join-form">

      <!-- Sélection de la partie -->
      <div class="join-field">
        <div class="join-field-header">
          <label for="p-partie-select" class="join-label-text">Partie</label>
          <!-- Bouton rafraîchir la liste -->
          <button id="p-btn-refresh" class="btn-refresh" title="Actualiser la liste" aria-label="Actualiser">
            🔄
          </button>
        </div>
        <!-- ✅ Select alimenté dynamiquement par player.js via socket GET_PARTIES -->
        <select id="p-partie-select" class="select-primary">
          <option value="">Chargement des parties…</option>
        </select>
        <!-- Message d'état (chargement / vide) -->
        <span id="p-parties-loading" class="join-loading" hidden>Connexion au serveur…</span>
      </div>

      <!-- Pseudo -->
      <div class="join-field">
        <label for="p-pseudo" class="join-label-text">Votre pseudo</label>
        <input
          type="text"
          id="p-pseudo"
          class="input-primary"
          placeholder="Ex : Alice"
          maxlength="20"
          autocomplete="off"
          autocorrect="off"
          autocapitalize="words"
          spellcheck="false"
        >
      </div>

      <!-- Message d'erreur -->
      <div id="p-join-error" class="join-error" hidden></div>

      <!-- Bouton rejoindre -->
      <button id="p-btn-join" class="btn-primary btn-join-action">
        🎮 Rejoindre
      </button>

      <!-- Lien si aucune partie (affiché par JS si la liste est vide) -->
      <p id="p-no-game-hint" class="join-empty" hidden>
        Aucune partie active pour l'instant.<br>
        <a href="/" class="join-empty-link">Créer une partie depuis l'accueil →</a>
      </p>

    </div>
  </div>
</div>

<!-- ══════════════════════════════════════════════════════
     ÉCRAN 2 : LOBBY — En attente du lancement
     Visible après JOIN_OK, masqué après GAME_STARTED
════════════════════════════════════════════════════════ -->
<div id="player-lobby" class="player-screen" hidden>
  <div class="lobby-card">

    <!-- Identité du joueur -->
    <div class="lobby-avatar-block">
      <div class="lobby-avatar" id="lobby-avatar-letter">?</div>
      <div class="lobby-pseudo-block">
        <div class="lobby-pseudo" id="lobby-pseudo-text">—</div>
        <div class="lobby-equipe" id="lobby-equipe-text"></div>
      </div>
    </div>

    <!-- Badges jeu / mode -->
    <div class="lobby-game-info">
      <span class="badge-jeu"  id="lobby-badge-jeu">—</span>
      <span class="badge-mode" id="lobby-badge-mode">—</span>
    </div>

    <!-- Indicateur d'attente -->
    <div class="lobby-waiting">
      <div class="lobby-spinner"></div>
      <span>En attente du lancement par le host…</span>
    </div>

    <!-- Liste des joueurs connectés -->
    <div class="lobby-joueurs-section">
      <h3>Joueurs connectés</h3>
      <div class="lobby-joueurs-liste" id="lobby-joueurs-liste">
        <span class="lobby-joueur-empty">En attente…</span>
      </div>
    </div>

  </div>
</div>

<!-- ══════════════════════════════════════════════════════
     ÉCRAN 3 : JEU EN COURS
     Visible après GAME_STARTED
     player.js charge dynamiquement /games/{jeu}/game.js
     et appelle initGame(session, socket)
════════════════════════════════════════════════════════ -->
<div id="player-game" class="player-screen" hidden>

  <!-- En-tête avec infos de partie -->
  <div class="player-game-header">
    <div class="player-game-info">
      <span id="player-game-jeu" class="badge-jeu">—</span>
      <span id="player-game-mode" class="badge-mode">—</span>
    </div>
    <!-- Mini-scoreboard live (mis à jour par SCORES_UPDATE) -->
    <div id="player-mini-scoreboard" class="player-mini-sb" hidden></div>
  </div>

  <!-- Zone de jeu — injectée par game.js -->
  <div id="player-game-area" class="player-game-main">
    <p style="text-align:center;padding:2rem;color:var(--c-text-mute)">
      Chargement du jeu…
    </p>
  </div>

</div>

<!-- ══════════════════════════════════════════════════════
     ÉCRAN 4 : RÉSULTATS FINAUX
     Visible après GAME_ENDED
════════════════════════════════════════════════════════ -->
<div id="player-results" class="player-screen" hidden>
  <div class="results-card">

    <h1>🏆 Résultats</h1>
    <p id="results-message" class="results-message"></p>

    <!-- Classement final -->
    <div id="results-liste" class="results-list"></div>

    <!-- Actions post-partie -->
    <div class="results-actions">
      <button id="btn-rejoin" class="btn-secondary">
        🔄 Rejoindre une autre partie
      </button>
      <a href="/" class="btn-ghost">
        🏠 Retour à l'accueil
      </a>
    </div>

  </div>
</div>

<!-- ══ MODULE PLAYER ═══════════════════════════════════ -->
<script type="module" src="/js/player.js"></script>

</body>
</html>
