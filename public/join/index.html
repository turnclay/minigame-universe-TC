<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MiniGame Universe — Rejoindre</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/player.css">
  <!-- ✅ Chemin correct vers le logo -->
  <link rel="icon" type="image/png" href="/images/LogoMiniGame.png">
</head>
<body class="player-body">

  <!-- ── Bandeau déconnexion ── -->
  <div class="player-disconnect-banner" hidden>
    ⚠️ Connexion perdue — reconnexion en cours…
  </div>

  <!-- ── ÉCRAN 1 : Formulaire de connexion ── -->
  <div id="player-join" class="player-screen">
    <div class="join-card">
      <img src="/images/LogoMiniGame.png" alt="Logo" class="join-logo">
      <h1>Rejoindre une partie</h1>

      <label>Ton pseudo
        <input type="text" id="p-pseudo" class="input-primary"
               placeholder="Ex: SuperJoueur42" maxlength="20" autocomplete="off">
      </label>

      <label>Partie
        <select id="p-partie-select" class="select-primary">
          <option value="">Chargement…</option>
        </select>
      </label>

      <!-- Bloc équipe (affiché en mode team uniquement) -->
      <div id="p-equipe-bloc" hidden>
        <label>Équipe
          <select id="p-equipe-select" class="select-primary">
            <option value="">-- Choisir une équipe --</option>
          </select>
        </label>
      </div>

      <p id="p-join-error" class="join-error" hidden></p>

      <button id="p-btn-join" class="btn-primary btn-full">
        🎮 Rejoindre
      </button>

      <button id="p-btn-refresh" class="btn-secondary btn-full" style="margin-top:8px">
        🔄 Actualiser les parties
      </button>
    </div>
  </div>

  <!-- ── ÉCRAN 2 : Lobby d'attente ── -->
  <div id="player-lobby" class="player-screen" hidden>
    <div class="lobby-card">

      <div class="lobby-avatar-block">
        <div class="lobby-avatar" id="p-avatar">?</div>
        <div class="lobby-pseudo-block">
          <span class="lobby-pseudo" id="p-pseudo-display"></span>
          <span class="lobby-equipe" id="p-equipe-display"></span>
        </div>
      </div>

      <div class="lobby-waiting">
        <div class="lobby-spinner"></div>
        <p>En attente du host…</p>
      </div>

      <div class="lobby-joueurs-section">
        <h3>👥 Joueurs connectés</h3>
        <div id="p-liste-joueurs" class="lobby-joueurs-liste"></div>
      </div>

      <div class="lobby-game-info">
        <span id="p-lobby-jeu" class="badge-jeu"></span>
        <span id="p-lobby-mode" class="badge-mode"></span>
      </div>
    </div>
  </div>

  <!-- ── ÉCRAN 3 : Jeu en cours ── -->
  <div id="player-game" class="player-screen" hidden>

    <!-- Header fixe avec infos joueur -->
    <header class="player-game-header">
      <span class="pg-pseudo" id="p-header-pseudo"></span>
      <span class="pg-equipe" id="p-header-equipe"></span>
      <span class="pg-score" id="p-header-score">0 pts</span>
    </header>

    <!-- Zone de contenu du jeu (le host envoie des instructions) -->
    <main class="player-game-main">
      <div id="p-game-content" class="game-content">
        <div class="game-waiting">
          <div class="game-icon">🎮</div>
          <p>La partie est en cours !</p>
          <p class="game-sub">Suis les instructions du host.</p>
        </div>
      </div>

      <!-- Bouton action générique (peut être caché/affiché par la logique de jeu) -->
      <div id="p-action-zone" class="action-zone" hidden>
        <button id="p-btn-action" class="btn-primary btn-xl">
          Répondre
        </button>
      </div>
    </main>
  </div>

  <!-- ── ÉCRAN 4 : Résultats ── -->
  <div id="player-results" class="player-screen" hidden>
    <div class="results-card">
      <h1>🏁 Fin de partie !</h1>
      <div id="p-results-content" class="results-list"></div>
      <button id="p-btn-rejouer" class="btn-primary btn-full">
        🔄 Rejoindre une autre partie
      </button>
    </div>
  </div>

  <script type="module" src="/js/player.js"></script>
</body>
</html>
