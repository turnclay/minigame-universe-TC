<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Le Pendu — MiniGame Universe</title>
  <link rel="stylesheet" href="../../css/style.css" />
  <link rel="stylesheet" href="../../css/games.css" />
</head>
<body>

<!-- ═══════════════════════════════════════════
     TOPBAR
════════════════════════════════════════════ -->
<header class="game-topbar">
  <a href="../../" class="btn-icon" title="Accueil">🏠</a>
  <h1 class="game-title">🪢 Le Pendu</h1>
  <div class="topbar-right">
    <span class="topbar-info">Erreurs : <strong id="pendu-nb-erreurs">0</strong> / 7</span>
  </div>
</header>

<!-- ═══════════════════════════════════════════
     SCOREBOARD FLOTTANT
════════════════════════════════════════════ -->
<div id="scoreboard-float" class="scoreboard-float"></div>

<!-- ═══════════════════════════════════════════
     CONTENU PRINCIPAL
════════════════════════════════════════════ -->
<main class="game-main">
  <section id="pendu" class="game-section">

    <div class="pendu-layout">

      <!-- Dessin du pendu (SVG injecté par pendu.js) -->
      <div id="pendu-dessin" class="pendu-dessin"></div>

      <div class="pendu-right">

        <!-- Thème (caché par défaut) -->
        <div id="pendu-theme-display" class="pendu-theme" style="display:none"></div>

        <!-- Mot à deviner -->
        <div id="pendu-mot" class="pendu-mot"></div>

        <!-- Clavier virtuel -->
        <div id="pendu-clavier" class="pendu-clavier"></div>

      </div>
    </div>

  </section>
</main>

<!-- ═══════════════════════════════════════════
     FOOTER ACTIONS
════════════════════════════════════════════ -->
<footer class="game-footer">
  <button id="pendu-theme-toggle" class="btn-secondary">🎯 Afficher le thème</button>
  <button id="pendu-rejouer" class="btn-primary" hidden>🔄 Mot suivant</button>
</footer>

<!-- ═══════════════════════════════════════════
     SCRIPTS
════════════════════════════════════════════ -->
<script type="module">
  import { GameState } from "../../js/core/state.js";
  import { initialiserPendu } from "../../js/games/pendu.js";

  const session = sessionStorage.getItem("mgu_game_session");
  if (session) {
    try { Object.assign(GameState, JSON.parse(session)); } catch(e) {}
  }

  document.addEventListener("DOMContentLoaded", () => {
    initialiserPendu();
  });
</script>

</body>
</html>
