<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Juste Prix — MiniGame Universe</title>
  <link rel="stylesheet" href="../../css/style.css" />
  <link rel="stylesheet" href="../../css/games.css" />
</head>
<body>

<!-- ═══════════════════════════════════════════
     TOPBAR
════════════════════════════════════════════ -->
<header class="game-topbar">
  <a href="../../" class="btn-icon" title="Accueil">🏠</a>
  <h1 class="game-title">💶 Juste Prix</h1>
  <div class="topbar-right">
    <span id="jp-timer" class="game-timer">01:00</span>
  </div>
</header>

<!-- ═══════════════════════════════════════════
     SCOREBOARD FLOTTANT
════════════════════════════════════════════ -->
<div id="scoreboard-float" class="scoreboard-float"></div>

<!-- ═══════════════════════════════════════════
     CONTENU PRINCIPAL
════════════════════════════════════════════ -->
<main class="game-main">
  <section id="justeprix" class="game-section">

    <!-- Badge catégorie -->
    <div class="jp-header">
      <span id="jp-categorie" class="badge-categorie"></span>
    </div>

    <!-- Carte produit -->
    <div class="jp-card">
      <img id="jp-produit-image" src="" alt="Produit" class="jp-image" />
      <div class="jp-info">
        <h2 id="jp-produit-nom" class="jp-nom">Chargement…</h2>
        <p id="jp-produit-description" class="jp-desc"></p>
        <a id="jp-produit-lien" href="#" target="_blank" rel="noopener" class="jp-lien">
          🔍 Rechercher sur Google Shopping
        </a>
      </div>
    </div>

    <!-- Prix (cliquable pour révéler) -->
    <button id="jp-produit-prix" class="jp-prix-btn">
      💶 Afficher le prix
    </button>

  </section>
</main>

<!-- ═══════════════════════════════════════════
     FOOTER ACTIONS
════════════════════════════════════════════ -->
<footer class="game-footer">
  <button id="jp-btn-prev" class="btn-secondary">⬅️ Précédent</button>
  <button id="jp-btn-next" class="btn-primary">➡️ Suivant</button>
</footer>

<!-- ═══════════════════════════════════════════
     SCRIPTS
════════════════════════════════════════════ -->
<script type="module">
  import { GameState } from "../../js/core/state.js";
  import { initialiserJustePrix } from "../../js/games/justeprix.js";

  const session = sessionStorage.getItem("mgu_game_session");
  if (session) {
    try { Object.assign(GameState, JSON.parse(session)); } catch(e) {}
  }

  document.addEventListener("DOMContentLoaded", () => {
    initialiserJustePrix();
  });
</script>

</body>
</html>
