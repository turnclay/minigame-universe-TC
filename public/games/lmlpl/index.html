<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Le Mot le Plus Long — MiniGame Universe</title>
  <link rel="stylesheet" href="../../css/style.css" />
  <link rel="stylesheet" href="../../css/games.css" />
</head>
<body>

<!-- ═══════════════════════════════════════════
     TOPBAR
════════════════════════════════════════════ -->
<header class="game-topbar">
  <a href="../../" class="btn-icon" title="Accueil">🏠</a>
  <h1 class="game-title">🔤 Le Mot le Plus Long</h1>
  <div class="topbar-right">
    <span id="lml-timer" class="game-timer">01:00</span>
  </div>
</header>

<!-- ═══════════════════════════════════════════
     SCOREBOARD FLOTTANT
════════════════════════════════════════════ -->
<div id="scoreboard-float" class="scoreboard-float"></div>

<!-- ═══════════════════════════════════════════
     CONTENU PRINCIPAL
════════════════════════════════════════════ -->
<main class="game-main">
  <section id="lml" class="game-section">

    <!-- Lettres disponibles (cliquables) -->
    <div class="lml-lettres-wrapper">
      <p class="lml-label">Lettres disponibles — cliquez pour composer</p>
      <div id="lml-lettres" class="lml-lettres"></div>
    </div>

    <!-- Zone de saisie du mot -->
    <div class="lml-input-wrapper">
      <input
        type="text"
        id="lml-input"
        class="lml-input"
        placeholder="Votre mot…"
        autocomplete="off"
        autocapitalize="characters"
        spellcheck="false"
      />
    </div>

    <!-- Résultat -->
    <div id="lml-resultat" class="lml-resultat"></div>

  </section>
</main>

<!-- ═══════════════════════════════════════════
     FOOTER ACTIONS
════════════════════════════════════════════ -->
<footer class="game-footer">
  <button id="lml-melanger" class="btn-secondary">🔀 Mélanger</button>
  <button id="lml-valider" class="btn-primary">✅ Valider</button>
  <button id="lml-rejouer" class="btn-secondary">🔄 Rejouer</button>
</footer>

<!-- ═══════════════════════════════════════════
     SCRIPTS
════════════════════════════════════════════ -->
<script type="module">
  import { GameState } from "../../js/core/state.js";
  import { initialiserLML } from "../../js/games/lml.js";

  const session = sessionStorage.getItem("mgu_game_session");
  if (session) {
    try { Object.assign(GameState, JSON.parse(session)); } catch(e) {}
  }

  document.addEventListener("DOMContentLoaded", () => {
    initialiserLML();
  });
</script>

</body>
</html>
