<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Petit Bac — MiniGame Universe</title>
  <link rel="stylesheet" href="../../css/style.css" />
  <link rel="stylesheet" href="../../css/games.css" />
</head>
<body>

<!-- ═══════════════════════════════════════════
     TOPBAR
════════════════════════════════════════════ -->
<header class="game-topbar">
  <a href="../../" class="btn-icon" title="Accueil">🏠</a>
  <h1 class="game-title">📝 Petit Bac</h1>
  <div class="topbar-right">
    <!-- Lettre du tour -->
    <span class="topbar-info">Lettre :</span>
    <span id="petitbac-lettre-actuelle" class="game-timer" style="min-width:2rem;text-align:center">?</span>
    <!-- Timer -->
    <span id="petitbac-timer" class="game-timer">02:00</span>
  </div>
</header>

<!-- ═══════════════════════════════════════════
     SCOREBOARD FLOTTANT
════════════════════════════════════════════ -->
<div id="scoreboard-float" class="scoreboard-float"></div>

<!-- ═══════════════════════════════════════════
     CONTENU PRINCIPAL
════════════════════════════════════════════ -->
<main class="game-main">
  <section id="petitbac" class="game-section">

    <!-- Grille des catégories (injectée dynamiquement par petitbac.js) -->
    <div id="petitbac-categories" class="petitbac-categories"></div>

  </section>
</main>

<!-- ═══════════════════════════════════════════
     FOOTER ACTIONS
════════════════════════════════════════════ -->
<footer class="game-footer">
  <button id="petitbac-valider" class="btn-primary">✅ Valider mes réponses</button>
</footer>

<!-- ═══════════════════════════════════════════
     SCRIPTS
════════════════════════════════════════════ -->
<script type="module">
  import { GameState } from "../../js/core/state.js";
  import { initialiserPetitBac } from "../../js/games/petitbac.js";

  const session = sessionStorage.getItem("mgu_game_session");
  if (session) {
    try { Object.assign(GameState, JSON.parse(session)); } catch(e) {}
  }

  document.addEventListener("DOMContentLoaded", () => {
    initialiserPetitBac();
  });
</script>

</body>
</html>
