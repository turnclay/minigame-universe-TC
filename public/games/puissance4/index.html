<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Puissance 4 — MiniGame Universe</title>
  <link rel="stylesheet" href="../../css/style.css" />
  <link rel="stylesheet" href="../../css/games.css" />
</head>
<body>

<!-- ═══════════════════════════════════════════
     TOPBAR
════════════════════════════════════════════ -->
<header class="game-topbar">
  <a href="../../" class="btn-icon" title="Accueil">🏠</a>
  <h1 class="game-title">🔴 Puissance 4</h1>
  <div class="topbar-right">
    <span id="puissance4-status" class="topbar-info"></span>
  </div>
</header>

<!-- ═══════════════════════════════════════════
     SCOREBOARD FLOTTANT
════════════════════════════════════════════ -->
<div id="scoreboard-float" class="scoreboard-float"></div>

<!-- ═══════════════════════════════════════════
     CONTENU PRINCIPAL
════════════════════════════════════════════ -->
<main class="game-main">
  <section id="puissance4" class="game-section">

    <!-- Grille 6×7 (colonnes injectées par puissance4.js) -->
    <div id="puissance4-grille" class="p4-grille"></div>

  </section>
</main>

<!-- ═══════════════════════════════════════════
     FOOTER ACTIONS
════════════════════════════════════════════ -->
<footer class="game-footer">
  <button id="puissance4-rejouer" class="btn-primary" style="display:none">🔄 Nouvelle partie</button>
</footer>

<!-- ═══════════════════════════════════════════
     SCRIPTS
════════════════════════════════════════════ -->
<script type="module">
  import { GameState } from "../../js/core/state.js";
  import { initialiserPuissance4 } from "../../js/games/puissance4.js";

  const session = sessionStorage.getItem("mgu_game_session");
  if (session) {
    try { Object.assign(GameState, JSON.parse(session)); } catch(e) {}
  }

  document.addEventListener("DOMContentLoaded", () => {
    initialiserPuissance4();
  });
</script>

</body>
</html>
